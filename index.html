<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4d58d" />
    <title>双人小游戏</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script defer src="./game.js"></script>
  </head>
  <body>
    <main class="app">
      <section id="lobby" class="screen lobby-screen">
        <div class="title-block">
          <p class="eyebrow">微信双人对战</p>
          <h1>双人小游戏</h1>
          <p class="subtitle">选一个游戏，创建房间后把链接发给她。</p>
        </div>

        <div class="game-picker" aria-label="选择游戏">
          <button class="game-choice active" type="button" data-game="gobang">
            <strong>五子棋</strong>
            <small>黑白棋盘对战</small>
            <span>创建五子棋房间</span>
          </button>
          <button class="game-choice" type="button" data-game="landlord">
            <strong>双人斗地主</strong>
            <small>出牌、接牌、跳过</small>
            <span>创建斗地主房间</span>
          </button>
        </div>

        <div class="panel">
          <button id="createRoomBtn" class="primary-btn" type="button">创建五子棋房间</button>
          <button id="createLandlordRoomBtn" class="primary-btn alt-btn" type="button">创建斗地主房间</button>
          <label class="join-field">
            <span>房间号</span>
            <input id="roomInput" maxlength="18" autocomplete="off" placeholder="输入对方给你的房间号" />
          </label>
          <button id="joinRoomBtn" class="secondary-btn" type="button">加入房间</button>
        </div>

        <p id="lobbyStatus" class="status">准备就绪</p>
      </section>

      <section id="gameScreen" class="screen game-screen hidden">
        <header class="topbar">
          <div>
            <p id="roleLabel" class="eyebrow">未连接</p>
            <h2 id="turnLabel">等待开始</h2>
          </div>
          <div class="top-actions">
            <button id="secretAdminBtn" class="secret-dot" type="button" aria-label="管理员入口"></button>
            <button id="copyInviteBtn" class="icon-btn" type="button" aria-label="复制邀请链接">↗</button>
          </div>
        </header>

        <div id="gobangMeta" class="score-row">
          <div class="stone-card black-card">
            <span class="stone black"></span>
            <div>
              <strong>黑棋</strong>
              <small id="blackName">你</small>
            </div>
          </div>
          <div class="stone-card white-card">
            <span class="stone white"></span>
            <div>
              <strong>白棋</strong>
              <small id="whiteName">对方</small>
            </div>
          </div>
        </div>

        <section id="adminPanel" class="admin-panel hidden">
          <div>
            <p class="eyebrow">管理员</p>
            <strong id="adminTitle">本回合下棋数量</strong>
          </div>
          <div class="quota-control">
            <button id="minusQuotaBtn" type="button" aria-label="减少">−</button>
            <output id="quotaValue">1</output>
            <button id="plusQuotaBtn" type="button" aria-label="增加">+</button>
          </div>
        </section>

        <div id="gobangArea" class="board-wrap">
          <div id="board" class="board" aria-label="五子棋棋盘"></div>
        </div>

        <section id="landlordArea" class="landlord-area hidden">
          <div class="play-table">
            <div>
              <p class="eyebrow">上一手</p>
              <div id="lastPlay" class="last-play">还没人出牌</div>
            </div>
            <button id="passBtn" class="secondary-btn" type="button">不要</button>
          </div>

          <div class="hand-info">
            <span id="opponentCount">对方 0 张</span>
            <span id="myCount">你 0 张</span>
          </div>

          <div id="hand" class="hand" aria-label="你的手牌"></div>

          <div class="card-actions">
            <button id="playCardsBtn" class="primary-btn" type="button">出牌</button>
            <button id="clearSelectionBtn" class="ghost-btn" type="button">取消选择</button>
          </div>
        </section>

        <footer class="actions">
          <button id="restartBtn" class="secondary-btn" type="button">重新开始</button>
          <button id="leaveBtn" class="ghost-btn" type="button">返回大厅</button>
        </footer>

        <p id="gameStatus" class="status">正在连接...</p>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status"></div>
  </body>
</html>
