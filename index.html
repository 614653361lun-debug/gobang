<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4d58d" />
    <title>双人五子棋</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script defer src="./game.js"></script>
  </head>
  <body>
    <main class="app">
      <section id="lobby" class="screen lobby-screen">
        <div class="title-block">
          <p class="eyebrow">微信双人对战</p>
          <h1>五子棋</h1>
          <p class="subtitle">黑棋创建房间，白棋打开邀请链接加入。</p>
        </div>

        <div class="panel">
          <button id="createRoomBtn" class="primary-btn" type="button">创建房间</button>
          <label class="join-field">
            <span>房间号</span>
            <input id="roomInput" maxlength="18" autocomplete="off" placeholder="输入对方给你的房间号" />
          </label>
          <button id="joinRoomBtn" class="secondary-btn" type="button">加入房间</button>
        </div>

        <p id="lobbyStatus" class="status">准备就绪</p>
      </section>

      <section id="gameScreen" class="screen game-screen hidden">
        <header class="topbar">
          <div>
            <p id="roleLabel" class="eyebrow">未连接</p>
            <h2 id="turnLabel">等待开始</h2>
          </div>
          <div class="top-actions">
            <button id="secretAdminBtn" class="secret-dot" type="button" aria-label="管理员入口"></button>
            <button id="copyInviteBtn" class="icon-btn" type="button" aria-label="复制邀请链接">↗</button>
          </div>
        </header>

        <div class="score-row">
          <div class="stone-card black-card">
            <span class="stone black"></span>
            <div>
              <strong>黑棋</strong>
              <small id="blackName">你</small>
            </div>
          </div>
          <div class="stone-card white-card">
            <span class="stone white"></span>
            <div>
              <strong>白棋</strong>
              <small id="whiteName">对方</small>
            </div>
          </div>
        </div>

        <section id="adminPanel" class="admin-panel hidden">
          <div>
            <p class="eyebrow">管理员</p>
            <strong>本回合下棋数量</strong>
          </div>
          <div class="quota-control">
            <button id="minusQuotaBtn" type="button" aria-label="减少">−</button>
            <output id="quotaValue">1</output>
            <button id="plusQuotaBtn" type="button" aria-label="增加">+</button>
          </div>
        </section>

        <div class="board-wrap">
          <div id="board" class="board" aria-label="五子棋棋盘"></div>
        </div>

        <footer class="actions">
          <button id="restartBtn" class="secondary-btn" type="button">重新开始</button>
          <button id="leaveBtn" class="ghost-btn" type="button">返回大厅</button>
        </footer>

        <p id="gameStatus" class="status">正在连接...</p>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status"></div>
  </body>
</html>
